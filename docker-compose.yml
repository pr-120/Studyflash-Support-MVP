services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studyflash
      POSTGRES_PASSWORD: studyflash
      POSTGRES_DB: studyflash_support
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyflash"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override DB URLs to point to the Docker Postgres container
      DATABASE_URL: "postgresql://studyflash:studyflash@db:5432/studyflash_support"
      DIRECT_URL: "postgresql://studyflash:studyflash@db:5432/studyflash_support"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
